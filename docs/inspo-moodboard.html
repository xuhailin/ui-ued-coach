<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>灵感墙 · UI/UED Coach</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/site-rail.css" />
    <link rel="stylesheet" href="./assets/inspo.css?v=20260513-3" />
    <script src="./assets/style-registry.js"></script>
    <script src="./assets/site-rail.js"></script>
  </head>
  <body data-page="home" data-initial-insp-style="moodboard">
    <main class="insp-shell">
      <div class="insp-util">
        <span class="insp-mark">灵感图录</span>
        <span class="insp-running">私人收藏 · 更新于 2026.05.13</span>
        <div class="insp-util-actions">
          <span class="insp-live">开放浏览</span>
          <nav class="insp-style-pages" id="insp-style-pages" aria-label="风格页面切换"></nav>
          <a class="insp-util-link" href="./style-atlas.html">风格图谱</a>
          <a class="insp-util-link is-primary" href="#insp-sections">开始翻阅</a>
        </div>
      </div>

      <header class="insp-masthead">
        <div>
          <h1>灵感图录<small>第一卷 · 编号 001 起</small></h1>
          <p class="insp-intro">一个按章节整理的网站、应用、作品集与资源索引。每条灵感都保留一句判断、一个视觉记号，以及适合训练时回看的理由。</p>
        </div>
        <div class="insp-meta">
          条目 · <b id="insp-total">00</b><br />
          分类 · <b id="insp-category-total">00</b><br />
          状态 · <span class="insp-live">开放</span>
        </div>
      </header>

      <section id="insp-style-judgment" class="insp-judgment-slot" aria-label="灵感图录风格判断"></section>

      <section class="insp-controls" aria-label="灵感筛选">
        <nav class="insp-groups" id="insp-groups" aria-label="灵感分类"></nav>
        <div class="insp-control-right">
          <label class="insp-search">
            <span>搜索</span>
            <input id="insp-search" type="search" placeholder="关键词 / 标签 / 站点" />
          </label>
          <div class="insp-viewmodes" aria-label="视图切换">
            <button id="insp-view-list" class="is-active" type="button" data-view="list">列表</button>
            <button id="insp-view-grid" type="button" data-view="grid">卡片</button>
          </div>
          <button class="insp-shuffle" id="insp-shuffle" type="button">换一组</button>
        </div>
      </section>

      <div class="insp-group-list" id="insp-sections"></div>

      <footer class="insp-colophon">
        <div>
          <h2>关于</h2>
          <p>这里不是资源仓库，而是每日训练时可以快速翻阅的视觉索引。重点看结构、节奏、动效和细节判断。</p>
        </div>
        <div>
          <h2>使用方式</h2>
          <p>先按分类扫一遍，再把最接近当天练习主题的条目打开。复盘时补一句“为什么值得看”。</p>
        </div>
        <div>
          <h2>风格</h2>
          <p>当前页面采用“图录档案”模型：章节、编号、估值、印刷质感和强分隔线共同形成可翻阅的收藏感。</p>
        </div>
      </footer>
    </main>

    <script src="./assets/inspo.js?v=20260513-3"></script>
  </body>
</html>
